name: Release

on:
  push:
    tags: ['v*']

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check plugin.json version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          if [ "$TAG" != "$PLUGIN_VERSION" ]; then
            echo "::error::Tag v$TAG does not match plugin.json version $PLUGIN_VERSION"
            exit 1
          fi

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: osx-x64
            os: macos-latest
          - rid: osx-arm64
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained binary
        run: >
          dotnet publish src/SharpRecon/SharpRecon.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -o publish

      - name: Archive
        run: tar -czf sharp-recon-${{ matrix.rid }}.tar.gz -C publish .

      - uses: actions/upload-artifact@v4
        with:
          name: sharp-recon-${{ matrix.rid }}
          path: sharp-recon-${{ matrix.rid }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: >
          gh release create "$TAG"
          artifacts/*
          --repo "${{ github.repository }}"
          --title "$TAG"
          --generate-notes
