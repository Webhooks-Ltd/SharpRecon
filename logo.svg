<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <radialGradient id="glass" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1c1f2a"/>
      <stop offset="70%" stop-color="#0d0f15"/>
      <stop offset="100%" stop-color="#05060a"/>
    </radialGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
  </defs>

  <!-- outer body -->
  <circle cx="256" cy="256" r="210" fill="#0b0c11"/>

  <!-- scope metal ring -->
  <circle cx="256" cy="256" r="180" stroke="#1b1e27" stroke-width="36" fill="none"/>

  <!-- inner glass -->
  <circle cx="256" cy="256" r="150" fill="url(#glass)" stroke="url(#accent)" stroke-width="6"/>

  <!-- glass reflection -->
  <ellipse cx="210" cy="200" rx="70" ry="40" fill="#ffffff" opacity="0.06"/>

  <!-- crosshair -->
  <line x1="256" y1="120" x2="256" y2="392" stroke="#00E5FF" opacity="0.25" stroke-width="3"/>
  <line x1="120" y1="256" x2="392" y2="256" stroke="#00E5FF" opacity="0.25" stroke-width="3"/>

  <!-- centre sharp S -->
  <path d="M205 195 L295 195 L245 255 L305 255 L220 330"
        stroke="white"
        stroke-width="18"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

</svg>
